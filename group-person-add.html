  <script>
  function showComingSoon(reportName) {
    document.getElementById('comingSoonModalBody').textContent = reportName + ' - Yakında';
    var modal = new bootstrap.Modal(document.getElementById('comingSoonModal'));
    modal.show();
  }

  document.addEventListener("DOMContentLoaded", () => {
  const userData = sessionStorage.getItem("user_data") || sessionStorage.getItem("user");
  const userToken = sessionStorage.getItem("user_token") || sessionStorage.getItem('token');
    let fullName = "Kullanıcı";
    if (userData) {
      try {
        const user = JSON.parse(userData);
        fullName = `${user.firstName ?? ""} ${user.lastName ?? ""}`.trim();
        if (!fullName && userToken) fullName = `Token: ${userToken.slice(0, 6)}...`;
      } catch (err) {
        console.error("Kullanıcı bilgileri parse edilemedi:", err);
      }
    }
    const nameSpan = document.getElementById("userNameText");
    if(nameSpan) nameSpan.textContent = fullName || "Kullanıcı";
    
    const logoutBtn = document.getElementById("logoutBtn");
    if (logoutBtn) {
      logoutBtn.addEventListener("click", (e) => {
        e.preventDefault();
        sessionStorage.removeItem('user');
        sessionStorage.removeItem('user_token');
        sessionStorage.removeItem('token');
        window.location.href = "main.html";
      });
    }
  });
  </script>
</script>
<script>
// Sidebar aktif sekme vurgulama
document.addEventListener('DOMContentLoaded', function() {
  const path = window.location.pathname.split('/').pop();
  document.querySelectorAll('.sb-sidenav-menu .nav-link').forEach(function(link) {
    if (link.getAttribute('href') === path) {
      link.classList.add('active');
    } else {
      link.classList.remove('active');
    }
  });
  // Gruplar menüsü için özel durum
  if (path === 'group-create.html' || path === 'group-person-add.html' || path === 'group-manage.html') {
    const groupsCollapse = document.getElementById('collapseGroups');
    if (groupsCollapse) groupsCollapse.classList.add('show');
    document.querySelectorAll('.nav-link[href="' + path + '"]').forEach(function(link) {
      link.classList.add('active');
    });
  }
});
</script>
