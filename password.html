<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta name="description" content="Şifre sıfırlama" />
    <title>Şifremi Unuttum - WaMark</title>
  <link rel="icon" type="image/png" href="img/WaMark_Mini_Logo.png">
  <link href="css/styles.css" rel="stylesheet" />
  <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body class="bg-primary">
  <div id="layoutAuthentication">
    <div id="layoutAuthentication_content">
      <main>
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-lg-5">
              <div class="card shadow-lg border-0 rounded-lg mt-5">
                <div class="card-header">
                  <h3 class="text-center font-weight-light my-4">Şifre Sıfırlama</h3>
                </div>
                <div class="card-body">
                  <div class="small mb-3 text-muted">
                    Şifre sıfırlama kodu almak için e-posta adresinizi girin.
                  </div>
                  <form id="resetForm">
                    <div class="form-floating mb-3">
                      <input class="form-control" id="inputEmail" type="email" placeholder="name@example.com" required />
                      <label for="inputEmail">E-posta adresi</label>
                    </div>
                    <div class="d-grid mt-4 mb-0">
                      <button class="btn btn-primary" type="submit" id="resetPasswordBtn">Kodu Gönder</button>
                    </div>
                    <div id="resetError" class="text-danger text-center mt-3" style="display: none;"></div>
                    <div id="resetSuccess" class="text-success text-center mt-3" style="display: none;"></div>
                  <!-- Kod girme alanı, kod gönderildikten sonra açılır -->
                  <div id="codeSection" style="display:none; margin-top:20px;">
                    <div class="form-floating mb-3">
                      <input class="form-control" id="inputCode" type="text" placeholder="Doğrulama kodu" />
                      <label for="inputCode">E-posta ile gelen kod</label>
                    </div>
                    <div class="mb-2 text-center">
                      <span id="timerText" style="font-weight:bold; color:#333;"></span>
                    </div>
                    <div class="d-grid mt-2 mb-2">
                      <button class="btn btn-success mb-2" type="button" id="verifyCodeBtn">Kodu Doğrula</button>
                      <button class="btn btn-outline-secondary" type="button" id="resendCodeBtn" disabled>Yeniden Kod Gönder</button>
                    </div>
                    <div id="codeError" class="text-danger text-center mt-2" style="display: none;"></div>
                  </div>
                  </form>
                </div>
                <div class="card-footer text-center py-3">
                  <div class="small">
                    <a href="login.html">Giriş ekranına dön</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <div id="layoutAuthentication_footer">
      <footer class="py-4 bg-light mt-auto">
        <div class="container-fluid px-4">
          <div class="d-flex align-items-center justify-content-between small">
            <div class="text-muted">Copyright &copy; Your Website 2023</div>
            <div>
              <a href="#">Privacy Policy</a>
              &middot;
              <a href="#">Terms &amp; Conditions</a>
            </div>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <script src="js/password.js"></script>
</body>
</html>
