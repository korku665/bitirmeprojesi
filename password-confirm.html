<!DOCTYPE html>
<html lang="tr">
<head>
  <script>
    // Sayfa yüklenmeden önce sessionStorage kontrolü (reset akışı sekme bazlı olmalı)
    try {
      const resetEmail = sessionStorage.getItem('reset_email');
      const codeVerified = sessionStorage.getItem('reset_code_verified');
      if (!resetEmail || codeVerified !== '1') {
        window.location.replace('401.html');
      }
    } catch (e) {
      // Eğer sessionStorage erişimi engellenirse (nadir): güvenlik sebebiyle geri gönder
      window.location.replace('401.html');
    }
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Şifre Onay - Panel</title>
  <script src="js/auth-guard.js"></script>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <link rel="icon" type="image/png" href="img/WaMark_Mini_Logo.png">
  <link href="css/styles.css" rel="stylesheet" />
  <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/reset-confirm.js"></script>
  <!-- <script src="js/password-confirm-protect.js"></script> -->
  <!-- auth-guard.js eklendi; eski inline auth kontrolü kaldırıldı -->
  </head>
  <body class="bg-primary">
    <div id="layoutAuthentication">
      <div id="layoutAuthentication_content">
        <main>
          <div class="container">
            <div class="row justify-content-center">
              <div class="col-lg-5">
                <div class="card shadow-lg border-0 rounded-lg mt-5">
                  <div class="card-header">
                    <h3 class="text-center font-weight-light my-4">Şifreyi Sıfırla</h3>
                  </div>
                  <div class="card-body">
                    <form id="resetConfirmForm">
                      <div class="form-floating mb-3">
                        <input class="form-control" id="emailInput" type="email" readonly />
                        <label for="emailInput">Email adresiniz</label>
                      </div>
                      <!-- Kod giriş alanı kaldırıldı -->
                      <div class="form-floating mb-3">
                        <input class="form-control" id="newPassword" type="password" placeholder="Yeni şifre" required />
                        <label for="newPassword">Yeni Şifre</label>
                      </div>
                      <div class="form-floating mb-3">
                        <input class="form-control" id="confirmPassword" type="password" placeholder="Yeni şifre (tekrar)" required />
                        <label for="confirmPassword">Yeni Şifre (Tekrar)</label>
                      </div>
                      <div class="d-grid gap-2">
                        <button class="btn btn-primary" type="submit">Şifreyi Güncelle</button>
                      </div>
                    </form>
                    <div id="resetError" class="text-danger text-center mt-3" style="display: none;"></div>
                    <div id="resetSuccess" class="text-success text-center mt-3" style="display: none;"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
