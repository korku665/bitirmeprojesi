<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>401 Yetkisiz Erişim - WaMark</title>
  <link rel="icon" type="image/png" href="img/WaMark_Mini_Logo.png">
  <link href="css/styles.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
  
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #1e2229; 
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
      position: relative;
    }

    body::before, body::after {
      content: "";
      position: fixed; 
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      opacity: 0.12; 
      background-image: 
        radial-gradient(#25d366 1px, transparent 1px), 
        radial-gradient(rgba(33, 150, 243, 0.4) 1px, transparent 1px); 
      background-size: 50px 50px;
      background-position: 0 0, 25px 25px;
      animation: networkFlow 60s linear infinite; 
      z-index: -1;
    }

    @keyframes networkFlow {
      from { transform: rotate(0deg) translate(-5%, -5%); }
      to { transform: rotate(5deg) translate(5%, 5%); }
    }

    .bg-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, transparent 0%, #15181d 100%);
      z-index: -1;
    }

    #layoutError {
      display: flex !important;
      flex-direction: column !important;
      min-height: 100vh !important;
      width: 100% !important;
      justify-content: center !important;
      align-items: center !important;
      position: relative;
      z-index: 1;
    }

    #layoutError_content {
      width: 100% !important;
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      flex: 1 0 auto !important;
      padding: 2rem 1rem !important;
    }

    .error-container {
      width: 100% !important;
      max-width: 440px !important; 
      margin: 0 auto !important;
    }

    .auth-card {
      background: rgba(30, 34, 41, 0.65) !important; 
      backdrop-filter: blur(16px); 
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08) !important; 
      border-radius: 24px !important; 
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.35) !important;
      padding: 3rem 2rem !important;
    }

    .error-code {
      font-size: 5.5rem;
      font-weight: 900;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #ff6b6b 0%, #ff8787 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .btn-auth {
      background: linear-gradient(135deg, #25d366 0%, #1da851 100%) !important;
      border: none !important;
      color: #ffffff !important;
      padding: 0.85rem !important;
      border-radius: 14px !important;
      font-weight: 600 !important;
      font-size: 1rem;
      transition: all 0.25s ease !important;
      box-shadow: 0 4px 18px rgba(37, 211, 102, 0.25) !important;
      text-decoration: none;
      display: block;
    }

    .btn-auth:hover {
      transform: scale(1.01);
      box-shadow: 0 6px 25px rgba(37, 211, 102, 0.4) !important;
      color: #ffffff !important;
    }
  </style>
</head>
<body>
  <div class="bg-overlay"></div>

  <div id="layoutError">
    <div id="layoutError_content">
      <div class="error-container">
        
        <div class="card auth-card text-center">
          <div class="error-code">401</div>
          <h3 class="text-white fw-bold mb-3">Yetkisiz Erişim</h3>
          <p class="text-white-50 small mb-4">Bu sayfayı görüntülemek için gerekli oturum izinlerine sahip değilsiniz veya güvenli oturum süreniz dolmuş.</p>
          <div class="d-grid">
            <a class="btn-auth" href="main.html"><i class="bi bi-arrow-left me-2"></i>Giriş Ekranına Dön</a>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="js/scripts.js"></script>
</body>
</html>
